name: 发布 Media Saber 站点操作

on:
  push:
    tags:
      - "v*"
    paths:
      - "media-saber-site-ops/**"
      - ".github/workflows/publish-site-ops.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-site-ops to ClawHub
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd media-saber-site-ops
          clawhub publish . --slug media-saber-site-ops --version $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Media Saber 站点操作 ${{ github.ref_name }}"
          files: dist/media-saber-site-ops.zip
          body: "## Media Saber 站点操作\n\n**版本**: ${{ github.ref_name }}\n\nPT 站点管理和诊断\n\n### 功能\n- 站点签到\n- 数据同步\n- 通知和消息管理\n- 邮件 RSS 测试\n- 站点诊断\n\n### 安装\n需要配置 Media Saber MCP 服务连接。详见 SKILL.md"
          generate_release_notes: true
