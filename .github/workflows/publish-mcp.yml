name: 发布 Media Saber MCP

on:
  push:
    branches:
      - master
    paths:
      - "media-saber-mcp/**"
      - ".github/workflows/publish-mcp.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +3.0.%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Update version in skill.json
        run: |
          cd media-saber-mcp
          jq --arg version "${{ steps.version.outputs.version }}" '.version = $version' skill.json > skill.json.tmp && mv skill.json.tmp skill.json
          cd ..

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-mcp to ClawHub
        run: |
          cd media-saber-mcp
          clawhub publish . --slug media-saber-mcp --name "Media Saber MCP" --version ${{ steps.version.outputs.version }} --changelog "优化 MCP 配置、增强安全性、完善文档"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: "media-saber-mcp-${{ steps.version.outputs.version }}"
          name: "Media Saber MCP ${{ steps.version.outputs.version }}"
          files: dist/media-saber-mcp.zip
          body: "## Media Saber MCP\n\n**版本**: ${{ steps.version.outputs.version }}\n\n完整的 MCP 工具包\n\n### 功能\n- 28+ 工具函数\n- 完整的媒体 Saber 功能\n- 实时监控和管理\n\n### 安装\n核心 MCP 服务的基础能力。详见 SKILL.md"
          generate_release_notes: true
