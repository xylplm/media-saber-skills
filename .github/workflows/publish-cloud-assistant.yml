name: 发布 Media Saber 云助手

on:
  push:
    tags:
      - "v*"
    paths:
      - "media-saber-cloud-assistant/**"
      - ".github/workflows/publish-cloud-assistant.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-cloud-assistant to ClawHub
        run: |
          cd media-saber-cloud-assistant
          clawhub publish . --slug media-saber-cloud-assistant

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Media Saber 云助手 ${{ github.ref_name }}"
          files: dist/media-saber-cloud-assistant.zip
          body: "## Media Saber 云助手\n\n**版本**: ${{ github.ref_name }}\n\n云存储和离线下载任务管理\n\n### 功能\n- 磁力/ed2k 离线下载\n- 115 云盘资源接收\n- 网络测试\n\n### 安装\n需要配置 Media Saber MCP 服务连接。详见 SKILL.md"
          generate_release_notes: true
