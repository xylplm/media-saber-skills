name: 发布技能包到ClawHub和GitHub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skill:
        description: '选择要发布的技能（留空发布全部）'
        required: false
        type: choice
        options:
          - '全部'
          - 'media-saber-cloud-assistant'
          - 'media-saber-mcp'
          - 'media-saber-recommend-helper'
          - 'media-saber-site-ops'
          - 'media-saber-subscribe-assistant'
          - 'media-saber-zspace-monitor'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Setup ClawHub Auth
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to ClawHub
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SKILL_CHOICE="${{ github.event.inputs.skill }}"
            if [[ "$SKILL_CHOICE" == "全部" || -z "$SKILL_CHOICE" ]]; then
              echo "🚀 手动发布全部技能到 ClawHub"
              clawhub sync --all --tags latest
            else
              echo "🚀 手动发布 $SKILL_CHOICE 到 ClawHub"
              clawhub skill publish "./$SKILL_CHOICE" --tags latest
            fi
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "📦 从标签 v$VERSION 发布全部技能"
            clawhub sync --all --tags latest
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
          generate_release_notes: true