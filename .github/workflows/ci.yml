name: 技能包验证和构建

on:
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Create Pre-Release
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.auto_release == 'true')
        run: |
          DATE=$(date +%Y%m%d)
          BUILD_TAG="pre-release-$DATE-${{ github.run_number }}"
          gh release create "$BUILD_TAG" dist/*.zip \
            --prerelease \
            --generate-notes \
            --title "Pre-Release Build ($DATE #${{ github.run_number }})" || true
