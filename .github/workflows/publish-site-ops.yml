name: 发布 Media Saber 站点操作

on:
  push:
    branches:
      - master
    paths:
      - "media-saber-site-ops/**"
      - ".github/workflows/publish-site-ops.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +3.0.%Y%m%d%H%M)
          TAG=$(date +%Y.%m.%d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Update version in skill.json
        run: |
          cd media-saber-site-ops
          jq --arg version "${{ steps.version.outputs.version }}" '.version = $version' skill.json > skill.json.tmp && mv skill.json.tmp skill.json
          cd ..

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-site-ops to ClawHub
        run: |
          cd media-saber-site-ops
          clawhub publish . --slug media-saber-site-ops --name "Media Saber 站点操作" --version ${{ steps.version.outputs.version }} --changelog "优化 MCP 配置、增强安全性、完善文档"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: "media-saber-site-ops-${{ steps.version.outputs.tag }}"
          name: "Media Saber 站点操作 ${{ steps.version.outputs.tag }}"
          files: dist/media-saber-site-ops.zip
          body: "## Media Saber 站点操作\n\n**版本**: ${{ steps.release_meta.outputs.version }}\n\nPT 站点管理和诊断\n\n### 功能\n- 签到管理\n- 同步配置\n- RSS 测试\n- 站点诊断\n\n### 安装\n需要配置 Media Saber MCP 服务连接。详见 SKILL.md"
          generate_release_notes: true
