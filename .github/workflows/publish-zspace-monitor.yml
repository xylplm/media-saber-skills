name: 发布 Media Saber 极空间监控

on:
  push:
    branches:
      - master
    paths:
      - "media-saber-zspace-monitor/**"
      - ".github/workflows/publish-zspace-monitor.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +3.0.%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Update version in skill.json
        run: |
          cd media-saber-zspace-monitor
          jq --arg version "${{ steps.version.outputs.version }}" '.version = $version' skill.json > skill.json.tmp && mv skill.json.tmp skill.json
          cd ..

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-zspace-monitor to ClawHub
        run: |
          cd media-saber-zspace-monitor
          clawhub publish . --slug media-saber-zspace-monitor --name "Media Saber 极空间监控" --version ${{ steps.version.outputs.version }} --changelog "扩展功能、定时监控、异常告警、优化 MCP 配置"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: "media-saber-zspace-monitor-${{ steps.version.outputs.version }}"
          name: "Media Saber 极空间监控 ${{ steps.version.outputs.version }}"
          files: dist/media-saber-zspace-monitor.zip
          body: "## Media Saber 极空间监控\n\n**版本**: ${{ steps.version.outputs.version }}\n\n实时 NAS 监控和异常告警\n\n### 功能\n- 实时监控（CPU、内存、温度、硬盘、网络）\n- 定时监控（5分钟、30分钟、每日）\n- 多级告警（绿色/黄色/橙色/红色）\n- 异常检测和趋势分析\n\n### 安装\n需要配置 Media Saber MCP 服务连接。详见 SKILL.md"
          generate_release_notes: true
