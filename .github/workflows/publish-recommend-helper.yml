name: 发布 Media Saber 推荐助手

on:
  push:
    branches:
      - master
    paths:
      - "media-saber-recommend-helper/**"
      - ".github/workflows/publish-recommend-helper.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +3.0.%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Build skills
        run: python build_skill.py

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Update version in skill.json
        run: |
          cd media-saber-recommend-helper
          jq --arg version "${{ steps.version.outputs.version }}" '.version = $version' skill.json > skill.json.tmp && mv skill.json.tmp skill.json
          cd ..

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish media-saber-recommend-helper to ClawHub
        run: |
          cd media-saber-recommend-helper
          clawhub publish . --slug media-saber-recommend-helper --name "Media Saber 推荐助手" --version ${{ steps.version.outputs.version }} --changelog "优化 MCP 配置、增强安全性、完善文档"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: "media-saber-recommend-helper-${{ steps.version.outputs.version }}"
          name: "Media Saber 推荐助手 ${{ steps.version.outputs.version }}"
          files: dist/media-saber-recommend-helper.zip
          body: "## Media Saber 推荐助手\n\n**版本**: ${{ steps.version.outputs.version }}\n\n结构化影视推荐\n\n### 功能\n- 国家、类型、年份筛选\n- 排序配置\n- 标签支持\n\n### 安装\n需要配置 Media Saber MCP 服务连接。详见 SKILL.md"
          generate_release_notes: true
